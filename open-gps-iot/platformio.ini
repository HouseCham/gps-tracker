; PlatformIO Project Configuration File
;
; https://docs.platformio.org/page/projectconf.html

[env:esp32s3box]
platform = espressif32@6.3.0
board = esp32s3box
framework = arduino
upload_speed = 921600
monitor_speed = 115200
board_build.partitions = huge_app.csv

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DTINY_GSM_MODEM_SIM7080
    -DTINY_GSM_RX_BUFFER=1024
    -I"${PROJECT_DIR}"

lib_deps =
    vshymanskyy/TinyGSM
    lewisxhe/XPowersLib
    bblanchon/ArduinoJson@^7

; Host-side test env. Runs pure-data modules under Unity on the developer
; machine — no ESP32 toolchain, no PMU/modem deps. The location_payload
; module lives in lib/location_payload/ and is auto-discovered by PIO.
; UNITY_INCLUDE_DOUBLE is required because we use double-typed fields in
; LocationPayload and Unity defaults to excluding double-precision asserts.
; build_src_filter excludes the Arduino-only src/*.cpp files (main, gps_board,
; secrets) which need the ESP32 toolchain. src/native_stub.cpp is a 1-line
; shim so PlatformIO's "Nothing to build" check has something to chew on.
[env:native]
platform = native
test_framework = unity
build_src_filter = +<native_stub.cpp>
build_flags = -DUNITY_INCLUDE_DOUBLE
lib_deps =
    bblanchon/ArduinoJson@^7
