version: "2"
sql:
  - engine: "postgresql"
    queries: "queries"
    schema: "migrations"
    gen:
      go:
        package: "postgres"
        out: "internal/infra/postgres"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_pointers_for_null_types: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
