# Nginx reverse proxy + static file server.
#
# Single entry point for both the frontend (Astro static build) and the
# backend API (Go + Fiber + Authula). Putting everything behind the same
# origin means the http-only `authula.session_token` cookie set by the
# backend is automatically readable by the frontend (no cross-origin
# dance, no need to share credentials between ports).
#
# Routes:
#   /             → static Astro build at /var/www/html
#   /api/auth/*   → backend api:8080/api/auth/* (Authula: login, signup, JWKS, OAuth callback)
#   /api/v1/*     → backend api:8080/api/v1/*   (app routes: devices, users, access)
#   /health       → backend api:8080/health

server {
    listen 80 default_server;
    server_name _;
    # Redirect plain HTTP to HTTPS so the cookie's secure flag (in prod)
    # and the browser's same-origin cookie scope both hold up.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript text/xml application/xml application/xml+rss
               image/svg+xml;
    gzip_min_length 256;

    root /var/www/html;
    index index.html;

    # ---- Backend API routes ----
    # Authula: sign-in, sign-up, JWKS, OAuth callback, token refresh.
    location /api/auth/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Authula uses redirect-based OAuth (302 to Google). Preserve
        # the original Host so the callback URL stays on https://localhost.
        proxy_redirect http://api:8080/ https://$host/;
        # Generous read timeout for OAuth callback flows that round-trip
        # through Google before coming back.
        proxy_read_timeout 60s;
    }

    # App routes (devices, users, access, etc.).
    location /api/v1/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Health check passthrough.
    location = /health {
        proxy_pass http://api:8080/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ---- Frontend static files ----
    # Astro static build emits a SPA-style index.html fallback. The
    # try_files chain mirrors what the standalone frontend nginx used
    # to do.
    location / {
        try_files $uri $uri/index.html $uri.html /index.html;
    }

    # Long-lived caching for fingerprinted assets.
    location ~* \.(?:css|js|svg|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/html;
    }
}