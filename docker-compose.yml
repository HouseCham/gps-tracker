services:
  db:
    build:
      context: ./db
    image: gps-tracker-db
    container_name: gps-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gps_pass}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.0
    container_name: gps-tracker-migrate
    restart: "no"
    command:
      - "-path"
      - /migrations
      - "-database"
      - "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD:-gps_pass}@db:5432/${POSTGRES_DB}?sslmode=disable"
      - up
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gps_pass}
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations:ro

  api:
    build:
      context: ./backend
      target: runtime
    image: gps-tracker-api
    container_name: gps-tracker-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD:-gps_pass}@db:5432/${POSTGRES_DB}?sslmode=disable
      AUTHULA_SECRET: ${AUTHULA_SECRET}
      AUTHULA_BASE_URL: ${AUTHULA_BASE_URL:-http://localhost:8080}
      SERVER_PORT: 8080
    depends_on:
      migrate:
        condition: service_completed_successfully
