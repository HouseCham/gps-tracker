services:
  db:
    build:
      context: ./db
    image: gps-tracker-db
    container_name: gps-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gps_pass}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.0
    container_name: gps-tracker-migrate
    restart: "no"
    command:
      - "-path"
      - /migrations
      - "-database"
      - "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD:-gps_pass}@db:5432/${POSTGRES_DB}?sslmode=disable"
      - up
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gps_pass}
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations:ro

  api:
    build:
      context: ./backend
      target: runtime
    image: gps-tracker-api
    container_name: gps-tracker-api
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD:-gps_pass}@db:5432/${POSTGRES_DB}?sslmode=disable
      JWT_JWKS_URL: ${JWT_JWKS_URL:-http://localhost/api/auth/.well-known/jwks.json}
      JWT_ISSUER: ${JWT_ISSUER:-http://localhost}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-gps-tracker-api}
      SERVER_PORT: 8080
      AUTHULA_BASE_URL: ${AUTHULA_BASE_URL}
      AUTHULA_SECRET: ${AUTHULA_SECRET}
      AUTHULA_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD:-gps_pass}@db:5432/${POSTGRES_DB}?sslmode=disable
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:-https://localhost/api/v1}
    image: gps-tracker-frontend
    container_name: gps-tracker-frontend
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - frontend_dist:/app/dist
    depends_on:
      - api

  nginx:
    build:
      context: ./nginx
    image: gps-tracker-nginx
    container_name: gps-tracker-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-443}:443"
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - frontend_dist:/var/www/html:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - api

volumes:
  frontend_dist: